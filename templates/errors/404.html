{% extends "base.html" %}
{% block title %}Page Not Found | Alex Porter{% endblock %}
{% block content %}

<section class="error-section">
  <div class="container">
    <div class="error-container">
      <div class="error-code">404</div>
      <h1 class="error-title">Oops! Page Not Found</h1>
      <p class="error-message">Sorry, the page you're looking for doesn't exist or has been moved.</p>
      <a href="{{ url_for('public.index') }}" class="btn-primary">Back to Home</a>
    </div>
  </div>
</section>

<style>
.error-section {
  min-height: 60vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 4rem 2rem;
}

.error-container {
  max-width: 500px;
}

.error-code {
  font-size: 8rem;
  font-weight: bold;
  color: var(--accent);
  line-height: 1;
  margin-bottom: 1rem;
}

.error-title {
  font-size: 2rem;
  margin-bottom: 1rem;
}

.error-message {
  color: var(--ink-3);
  margin-bottom: 2rem;
  font-size: 1.1rem;
}
</style>

{% endblock %}
