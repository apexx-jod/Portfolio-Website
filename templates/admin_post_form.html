{% extends "base.html" %}
{% block title %}{% if post %}Edit Post{% else %}New Post{% endif %} | Dashboard{% endblock %}
{% block content %}

<section class="admin-section">
  <div class="container" style="max-width:860px">
    <div class="admin-header">
      <div>
        <span class="section-tag">Blog Editor</span>
        <h1 class="page-title" style="margin-top:.25rem">{{ 'Edit Post' if post else 'New Post' }}</h1>
      </div>
      <a href="{{ url_for('admin.dashboard') }}" class="btn-outline">← Back to Dashboard</a>
    </div>

    <div class="resume-card" style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2.5rem">
      <form method="POST" class="auth-form" style="max-width:none">
        <div class="form-group">
          <label for="title">Post Title <span class="req">*</span></label>
          <input type="text" id="title" name="title" placeholder="Enter post title..." required value="{{ post.title if post else '' }}" style="font-size:1.1rem;padding:.85rem 1rem">
        </div>
        <div class="form-group">
          <label for="excerpt">Excerpt <span style="color:var(--ink-4);font-weight:400">(shown in listings)</span></label>
          <input type="text" id="excerpt" name="excerpt" placeholder="A brief summary of the article..." value="{{ post.excerpt if post else '' }}">
        </div>
        <div class="form-group">
          <label for="content">Content <span class="req">*</span> <span style="color:var(--ink-4);font-weight:400">(Markdown supported)</span></label>
          <textarea id="content" name="content" rows="18" placeholder="Write your article here...
Use ## for headings, ``` for code blocks..." required style="font-family:var(--font-mono);font-size:.875rem;line-height:1.75">{{ post.content if post else '' }}</textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="tags">Tags <span style="color:var(--ink-4);font-weight:400">(comma-separated)</span></label>
            <input type="text" id="tags" name="tags" placeholder="Flask, Python, API" value="{{ post.tags if post else '' }}">
          </div>
          <div class="form-group" style="justify-content:flex-end;padding-top:.5rem">
            <label class="checkbox-label" style="display:flex;align-items:center;gap:.75rem;cursor:pointer;margin-top:1.65rem">
              <input type="checkbox" name="published" {% if post and post.published %}checked{% endif %} style="width:18px;height:18px;accent-color:var(--accent)">
              <span style="font-weight:600">Publish immediately</span>
            </label>
          </div>
        </div>
        <div style="display:flex;gap:1rem;margin-top:.5rem">
          <button type="submit" class="btn-primary" style="padding:.8rem 2rem">
            {{ 'Update Post' if post else 'Create Post' }} →
          </button>
          <a href="{{ url_for('admin.dashboard') }}" class="btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</section>

{% endblock %}
