{% extends "base.html" %}
{% block title %}Login | Alex Porter{% endblock %}
{% block content %}

<section class="auth-section">
  <div class="auth-card">
    <div class="auth-header">
      <a href="{{ url_for('public.index') }}" class="nav-logo" style="font-size:1.8rem">AP<span class="dot">.</span></a>
      <h1>Welcome back</h1>
      <p>Sign in to continue</p>
    </div>
    <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-primary btn-submit">Sign In →</button>
    </form>
    <p class="auth-switch">Don't have an account? <a href="{{ url_for('auth.register') }}">Register</a></p>
  </div>
</section>

{% endblock %}
